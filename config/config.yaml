service:
  app_mode: debug
  http_port: :3000

database:
  db_type: mysql
  user: todolist
  password: todolist
  # 如果在本地跑 go run，这里填 127.0.0.1:3306
  # 如果在 Docker 容器里跑，这里填 mysql:3306 (服务名)
  host: 127.0.0.1:3306
  db_name: todolist
  charset: utf8mb4
  parse_time: True
  loc: Local

redis:
  redis_debug: true
  redis_addr: 127.0.0.1:6379
  redis_pw:
  redis_db_name: 2