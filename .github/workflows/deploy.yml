name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/todolist-server:latest

      - name: Copy infrastructure files to AWS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_KEY }}
          # 将 compose 文件和 config 目录一并传过去，确保挂载目录存在
          source: "docker-compose.yml,config/"
          target: "~/todolist"

      # 5. 远程连接 AWS 服务器进行部署
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            # --- 步骤 A: 准备基础设施 ---
            # 进入刚刚传好文件的目录
            cd ~/todolist
            
            # 一键拉起/更新 MySQL、Redis 以及极其关键的 todolist_network 网络
            docker-compose up -d
            
            # --- 步骤 B: 更新业务程序 ---
            # 拉取刚刚打包好的最新 Go 镜像
            docker pull ${{ secrets.DOCKER_USERNAME }}/todolist-server:latest
            
            # 删掉旧容器（如果不存在就忽略）
            docker rm -f todolist-app || true
            
            # 启动新容器，完美加入刚刚建好的网络！
            docker run -d \
              --name todolist-app \
              --network todolist_network \
              -p 3000:3000 \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/todolist-server:latest
            
            # 清理废弃的历史镜像，保持 AWS 磁盘整洁
            docker image prune -f