name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # GitHub 免费提供给你的运行环境

    steps:
      # 1. 检出你的最新代码
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. 登录 Docker Hub (使用你刚才配的 Secret)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. 自动打包镜像并推送到 Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/todolist-server:latest # 永远打上 latest 最新标签

      # 4. 远程连接 AWS 服务器进行部署
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/todolist-server:latest
            
            docker rm -f todolist-app || true
            
            docker run -d \
              --name todolist-app \
              --network todolist_network \
              -p 3000:3000 \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/todolist-server:latest
            
            docker image prune -f